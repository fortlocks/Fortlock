name: fortlock
description: Fortlock Smart Home Security System - ESP32 + MQTT + Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6

  # MQTT
  mqtt5_client: ^4.7.0

  # Firebase
  firebase_core: ^2.27.0
  firebase_database: ^10.4.0
  firebase_auth: ^4.17.0
  firebase_storage: ^11.6.0

  # Push Notification
  flutter_local_notifications: ^17.0.0

  # State management
  provider: ^6.1.2

  # Util
  intl: ^0.19.0
  shared_preferences: ^2.2.2
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

